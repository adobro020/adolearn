<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AdoLearn" />
    <title>AdoLearn — Page not found</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #0f172a; background: #f8fafc; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top left, #d1fae5, transparent 32rem), linear-gradient(180deg, #f8fafc, #eef2ff); }
      main { width: min(980px, 100%); overflow: hidden; border-radius: 34px; background: rgba(255,255,255,0.92); box-shadow: 0 24px 70px rgba(15,23,42,0.12); border: 1px solid rgba(203,213,225,0.8); padding: clamp(28px, 5vw, 56px); text-align: center; }
      .kicker { margin: 0; color: #059669; font-size: 12px; font-weight: 900; letter-spacing: 0.22em; text-transform: uppercase; }
      h1 { font-family: "Plus Jakarta Sans", "Inter", ui-sans-serif; margin: 12px 0 0; font-size: clamp(36px, 7vw, 64px); line-height: 0.95; letter-spacing: -0.05em; }
      .copy { margin: 18px auto 0; max-width: 620px; color: #475569; font-weight: 650; line-height: 1.7; }
      .image-wrap { margin: 30px auto 0; width: min(720px, 100%); border-radius: 32px; background: linear-gradient(135deg, #ecfdf5, #eff6ff); border: 1px solid rgba(167,243,208,0.8); padding: 18px; }
      img { width: 100%; max-height: 560px; object-fit: contain; display: block; margin: 0 auto; }
      .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }
      a { display: inline-flex; border-radius: 18px; text-decoration: none; padding: 14px 18px; font-weight: 900; }
      .primary { background: #020617; color: white; }
      .secondary { background: white; color: #334155; border: 1px solid rgba(203,213,225,0.95); }
      @media (prefers-color-scheme: dark) {
        :root { color: #f8fafc; background: #080a12; }
        body { background: radial-gradient(circle at top left, rgba(16,185,129,0.10), transparent 32rem), linear-gradient(180deg, #0b1020, #080a12); }
        main { background: rgba(15,23,42,0.92); border-color: rgba(148,163,184,0.18); box-shadow: 0 24px 70px rgba(0,0,0,0.38); }
        .copy { color: #cbd5e1; }
        .image-wrap { background: linear-gradient(135deg, #0f172a, #101b32); border-color: rgba(148,163,184,0.18); }
        .primary { background: #34d399; color: #022c22; }
        .secondary { background: #0f172a; color: #f8fafc; border-color: rgba(148,163,184,0.18); }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">404 | Page not found</p>
      <h1>This page wandered off course.</h1>
      <p class="copy">The page you opened does not exist or may have moved. Head back home or start a fresh learning path.</p>
      <div class="image-wrap">
        <img src="/assets/robot/robot-404.png" alt="A puzzled AdoLearn robot mascot holding a 404 sign" />
      </div>
      <div class="actions">
        <a class="primary" href="/">Go home</a>
        <a class="secondary" href="/create">Create a course</a>
      </div>
    </main>
  </body>
</html>
