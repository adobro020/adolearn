<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdoLearn — Page not found</title>
    <style>
      :root { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #0f172a; background: #f8fafc; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top left, #d1fae5, transparent 32rem), linear-gradient(180deg, #f8fafc, #eef2ff); }
      main { width: min(960px, 100%); overflow: hidden; border-radius: 34px; background: rgba(255,255,255,0.92); box-shadow: 0 24px 70px rgba(15,23,42,0.12); border: 1px solid rgba(203,213,225,0.8); padding: clamp(28px, 5vw, 56px); }
      .grid { display: grid; gap: 28px; align-items: center; }
      @media (min-width: 760px) { .grid { grid-template-columns: minmax(0, 1fr) 280px; } }
      p.kicker { margin: 0; color: #059669; font-size: 12px; font-weight: 900; letter-spacing: 0.22em; text-transform: uppercase; }
      h1 { margin: 12px 0 0; font-size: clamp(36px, 7vw, 64px); line-height: 0.95; letter-spacing: -0.05em; }
      p.copy { margin: 18px 0 0; max-width: 560px; color: #475569; font-weight: 650; line-height: 1.7; }
      a { display: inline-flex; margin-top: 26px; border-radius: 18px; background: #020617; color: white; text-decoration: none; padding: 14px 18px; font-weight: 900; }
      img { width: 100%; max-height: 310px; object-fit: contain; }
      @media (prefers-color-scheme: dark) {
        :root { color: #f8fafc; background: #080a12; }
        body { background: radial-gradient(circle at top left, rgba(16,185,129,0.10), transparent 32rem), linear-gradient(180deg, #0b1020, #080a12); }
        main { background: rgba(15,23,42,0.92); border-color: rgba(148,163,184,0.18); box-shadow: 0 24px 70px rgba(0,0,0,0.38); }
        p.copy { color: #cbd5e1; }
        a { background: #34d399; color: #022c22; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="grid">
        <section>
          <p class="kicker">404 · Page not found</p>
          <h1>This lesson path wandered off course.</h1>
          <p class="copy">The page you opened does not exist, moved, or needs a different course link. Head back to AdoLearn and keep building your learning path.</p>
          <a href="/">Go home</a>
        </section>
        <img src="/assets/robot/robot-teacher.png" alt="A friendly AdoLearn robot tutor" />
      </div>
    </main>
  </body>
</html>
